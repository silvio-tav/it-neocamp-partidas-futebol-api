spring:
  application:
    name: it-neocamp-projeto-final-workshop

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
    baseline-on-migrate: true

  datasource:
    url: jdbc:h2:mem:futeboldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html        # URL da interface visual
    tags-sorter: alpha             # ordena tags em ordem alfabética
    operations-sorter: alpha       # ordena operações em ordem alfabética
  api-docs:
    path: /v3/api-docs             # URL do JSON gerado pelo OpenAPI
