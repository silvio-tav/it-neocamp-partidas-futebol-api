spring:
  application:
    name: it-neocamp-projeto-final-workshop

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
    baseline-on-migrate: true

  datasource:
    url: jdbc:h2:mem:futeboldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR
    show-sql: true

jwt:
  # chave Base64 de 256 bits — troque em produção
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration-ms: 86400000  # 24 horas

springdoc:
  swagger-ui:
    path: /swagger-ui.html        # URL da interface visual
    tags-sorter: alpha             # ordena tags em ordem alfabética
    operations-sorter: alpha       # ordena operações em ordem alfabética
  api-docs:
    path: /v3/api-docs             # URL do JSON gerado pelo OpenAPI

---

spring:
  config:
    activate:
      on-profile: mysql

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/futeboldb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:futebol}
    password: ${MYSQL_PASSWORD:futebol}

  h2:
    console:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: CHAR
    show-sql: true
