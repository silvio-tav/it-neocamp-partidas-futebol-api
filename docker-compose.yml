services:
  mysql:
    image: mysql:8.4
    container_name: futebol-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: futeboldb
      MYSQL_USER: futebol
      MYSQL_PASSWORD: futebol
      MYSQL_ROOT_PASSWORD: root
      TZ: America/Sao_Paulo
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
